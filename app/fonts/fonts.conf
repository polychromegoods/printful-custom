<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <dir prefix="relative">./</dir>
    <cachedir>/tmp/fonts-cache</cachedir>

    <!-- Oswald Bold -->
    <match target="pattern">
        <test name="family"><string>Oswald</string></test>
        <edit name="file" mode="assign"><string>Oswald-Bold.ttf</string></edit>
    </match>

    <!-- Playfair Display Bold -->
    <match target="pattern">
        <test name="family"><string>Playfair Display</string></test>
        <edit name="file" mode="assign"><string>PlayfairDisplay-Bold.ttf</string></edit>
    </match>

    <!-- Montserrat Bold -->
    <match target="pattern">
        <test name="family"><string>Montserrat</string></test>
        <edit name="file" mode="assign"><string>Montserrat-Bold.ttf</string></edit>
    </match>

    <!-- Cormorant Garamond Bold -->
    <match target="pattern">
        <test name="family"><string>Cormorant Garamond</string></test>
        <edit name="file" mode="assign"><string>CormorantGaramond-Bold.ttf</string></edit>
    </match>

    <config></config>
</fontconfig>
